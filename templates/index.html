<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict Flood</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav>
    <h2>🌊 Rising Waters</h2>

    <div>
        <a href="/">Home</a>
    </div>
</nav>

<div class="container">

<h1>Flood Prediction</h1>

<form action="/prediction" method="POST">

<input type="number" name="Temp" placeholder="Temperature" required>

<input type="number" name="Humidity" placeholder="Humidity" required>

<input type="number" name="CloudCover" placeholder="Cloud Cover" required>

<input type="number" step="any" name="Annual" placeholder="Annual Rainfall" required>

<input type="number" step="any" name="JanFeb" placeholder="Jan-Feb Rainfall" required>

<input type="number" step="any" name="MarMay" placeholder="Mar-May Rainfall" required>

<input type="number" step="any" name="JunSep" placeholder="Jun-Sep Rainfall" required>

<input type="number" step="any" name="OctDec" placeholder="Oct-Dec Rainfall" required>

<input type="number" step="any" name="AvgJune" placeholder="Average June Rainfall" required>

<input type="number" step="any" name="Sub" placeholder="Subdivision Rainfall" required>

<button type="submit">
Predict Flood
</button>

</form>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
